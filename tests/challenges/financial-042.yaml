id: financial-042
name: "DK Tax — Aktiesparekonto vs Frie Midler vs Pension"
category: financial_tax_dk_hard
skill: megamind-financial
prompt: |
  I have DKK 200,000 to invest in Denmark. I already max out my
  ratepension and aldersopsparing. Should I put this in an
  aktiesparekonto, a regular frie midler depot, or something else?
  I plan to hold global index funds for 15+ years.
rubric:
  required_elements:
    ask_knows_aktiesparekonto: "Explains aktiesparekonto: 17% flat tax on gains (lagerbeskatning), DKK 135,900 max deposit (2025)"
    lager_on_ask: "Notes aktiesparekonto uses lagerbeskatning — taxed yearly on unrealized gains at 17%"
    frie_midler_realisation: "Notes individual stocks in frie midler use realisationsbeskatning at 27/42% aktieindkomst rates"
    frie_midler_etf_lager: "Notes that ETFs in frie midler are ALSO lager-taxed but at the higher 27/42% rates — worse than ASK"
    ask_advantage_quantified: "Quantifies or illustrates the 17% vs 27/42% rate advantage on ASK for the same lager treatment"
    deposit_limit_issue: "Notes the ASK deposit limit means only ~136K fits in ASK, remainder must go to frie midler"
    split_recommendation: "Recommends splitting: max ASK first (lower lager rate), overflow to frie midler individual stocks (realisation advantage)"
    index_fund_vs_etf_nuance: "Distinguishes Danish-domiciled index funds (may be realisation) from foreign ETFs (lager) for frie midler"
  anti_patterns:
    ignores_ask: "Doesn't mention aktiesparekonto as an option"
    wrong_ask_rate: "Gets the ASK tax rate wrong (it's 17%, not 27%)"
    treats_all_lager_same: "Doesn't distinguish between 17% ASK lager and 27/42% frie midler lager"
  passing_score: 6
