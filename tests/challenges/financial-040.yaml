id: financial-040
name: "DK Hybrid — Bank Switch Full Comparison"
category: financial_hybrid_dk
skill: megamind-financial
prompt: |
  I'm considering switching from Nordea to Danske Bank. I have a
  realkredit mortgage (DKK 2.5M, 3.5% fixed), a Mastercard, pension,
  and everyday banking. Danske Bank offers: free Mastercard Platinum,
  lower bidrag on realkredit if I move everything, and their own
  pension product. Nordea offers 0.5% cashback on the debit card.
  How do I compare these comprehensively? What matters most?
rubric:
  required_elements:
    total_cost_framework: "Sets up a comprehensive annual cost comparison across ALL products, not just one"
    bidrag_impact: "Calculates or estimates the bidrag savings on a DKK 2.5M mortgage — this is likely the largest single factor"
    card_benefits_comparison: "Compares Platinum insurance value vs cashback value quantitatively"
    pension_fee_comparison: "Flags that bank pension products typically have higher fees than self-directed (Nordnet) and questions whether moving pension is wise"
    switching_costs: "Identifies one-time costs: tinglysning for mortgage move, account setup, time/hassle"
    lock_in_risk: "Warns about bundling risk — getting locked into one provider for everything"
    mortgage_as_anchor: "Identifies that the mortgage bidrag savings is likely the dominant factor and should drive the decision"
    quantified_comparison: "Attempts to put actual DKK numbers on at least the top 2-3 factors"
  anti_patterns:
    single_factor: "Decides based on one factor (e.g., just the card or just the bidrag) without comprehensive comparison"
    ignores_pension_fees: "Moves pension to bank without questioning fee impact"
    qualitative_only: "Discusses pros and cons without attempting to quantify any financial impact"
  passing_score: 6
