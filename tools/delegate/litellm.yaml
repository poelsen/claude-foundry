# tools/delegate/litellm.yaml
#
# LiteLLM proxy config for the foundry-delegate flow.
#
# Each `model_name` is what you pass as --model on the client side (via
# ANTHROPIC_MODEL / the request body). The `litellm_params.model` tells
# LiteLLM how to route: `openai/<name>` for OpenAI-compatible endpoints
# (MiniMax, OpenRouter, Groq, DeepSeek direct, etc.).
#
# Customize entries below, then point an API key at each via env vars
# in $REPO_ROOT/.env (see .env.example for the set).

model_list:
  # MiniMax (direct, via their OpenAI-compat endpoint)
  - model_name: MiniMax-M2
    litellm_params:
      model: openai/MiniMax-M2
      api_base: https://api.minimax.chat/v1
      api_key: os.environ/MINIMAX_API_KEY

  # MiniMax via OpenRouter (alternative — commented out, pick one)
  # - model_name: MiniMax-M2
  #   litellm_params:
  #     model: openrouter/minimax/minimax-m2
  #     api_key: os.environ/OPENROUTER_API_KEY

  # Kimi K2 via Moonshot direct
  - model_name: Kimi-K2
    litellm_params:
      model: openai/moonshot-v1-128k
      api_base: https://api.moonshot.ai/v1
      api_key: os.environ/MOONSHOT_API_KEY

  # DeepSeek V3
  - model_name: DeepSeek-V3
    litellm_params:
      model: openai/deepseek-chat
      api_base: https://api.deepseek.com/v1
      api_key: os.environ/DEEPSEEK_API_KEY

litellm_settings:
  # Let the proxy serve requests even if some upstream keys are missing —
  # we only need one provider live to be useful.
  drop_params: true

general_settings:
  # No auth on the local proxy. It binds to 127.0.0.1 via litellm's
  # default + we never expose it externally. If you're on a multi-user
  # box, set LITELLM_MASTER_KEY and pass it via ANTHROPIC_AUTH_TOKEN.
  telemetry: false
